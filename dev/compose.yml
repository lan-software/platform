services:
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5430}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6370}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8021}:8025'
        networks:
            - sail
    garage:
        image: 'dxflrs/garage:v2.2.0'
        restart: unless-stopped
        ports:
            - '${FORWARD_GARAGE_S3_PORT:-3900}:3900'
            - '${FORWARD_GARAGE_RPC_PORT:-3901}:3901'
            - '${FORWARD_GARAGE_ADMIN_PORT:-3903}:3903'
        volumes:
            - './contrib/garage.toml:/etc/garage.toml'
            - 'garage-meta:/var/lib/garage/meta'
            - 'garage-data:/var/lib/garage/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - /garage
                - status
            interval: 10s
            retries: 3
            timeout: 5s
    garage-webui:
        image: 'khairul169/garage-webui:latest'
        restart: unless-stopped
        ports:
            - '${FORWARD_GARAGE_WEBUI_PORT:-3909}:3909'
        environment:
            API_BASE_URL: 'http://garage:3903'
            S3_ENDPOINT_URL: 'http://garage:3900'
        volumes:
            - './contrib/garage.toml:/etc/garage.toml:ro'
        networks:
            - sail
        depends_on:
            - garage


networks:
    lanparty:
        external: true
