global:
  scrape_interval: 1s
  evaluation_interval: 1s

# k6 pushes metrics via remote-write to this instance.
# No scrape targets needed for k6 itself.
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # LanCore application metrics (Spatie Prometheus + TrackHttpMetrics).
  # METRICS_TOKEN must match LanCore .env. Set via env var on the
  # prometheus container or hardcode here for local-only use.
  - job_name: lancore
    metrics_path: /metrics
    scheme: http
    scrape_interval: 5s
    scrape_timeout: 4s
    bearer_token: "loadtest-metrics-token-change-me"
    static_configs:
      - targets: ["host.docker.internal:80"]
        labels:
          app: lancore
